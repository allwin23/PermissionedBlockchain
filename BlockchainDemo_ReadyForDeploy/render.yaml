services:
  - type: web
    name: blockchain-demo
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: demo
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: blockchain-demo-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: AUTH_USERS
        value: '{"alice":"password123","admin":"admin123"}'

databases:
  - name: blockchain-demo-db
    plan: free
